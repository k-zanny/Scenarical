name: Supabase Keep Alive
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel keepalive endpoint
        run: |
          curl -sf "https://scenarical.com/api/keepalive?secret=${{ secrets.KEEPALIVE_SECRET }}"
